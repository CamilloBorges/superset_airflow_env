# Nginx Configuration - Data Platform Reverse Proxy
# Este arquivo configura HTTPS com SSL/TLS para Superset, Airflow e Hop

# Upstream backends
upstream superset_backend {
    server superset:8088;
}

upstream airflow_backend {
    server airflow-webserver:8080;
}

upstream hop_backend {
    server hop-server:8081;
}

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name _;
    
    # Redirecionar todo tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

# Superset HTTPS
server {
    listen 443 ssl http2;
    server_name _;

    # Certificados SSL
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    
    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Timeouts
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # Superset - Raiz do domínio
    location / {
        proxy_pass http://superset_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OAuth callback do Superset
    location /oauth-authorized/azure {
        proxy_pass http://superset_backend/oauth-authorized/azure;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

